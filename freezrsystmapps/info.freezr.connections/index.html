<!--
  info.freezr.connections / index.html
  Phase 1 connections home page. Lists the user's connected accounts and links
  to each per-service view (currently only /connections/mail).
-->
<div class="freezr-page">
  <nav class="freezr-nav">
    <span class="freezr-nav-title">Connections</span>
    <a href="/account/home">Home</a>
    <a href="/account/resources">Manage Accounts</a>
    <a href="/account/logout">Log Out</a>
  </nav>

  <div class="freezr-content">
    <div id="warnings" class="errorBox" style="display:none;"></div>

    <div class="freezr-card">
      <h3 style="margin: 0;">Your Connected Accounts</h3>
      <p class="smallText" style="margin-top: 0.5rem;">
        Authorized external accounts (Google in Phase 1; Microsoft, IMAP, others later).
        Add or remove connections at <a href="/account/resources">Account Resources</a>.
      </p>
    </div>

    <div style="text-align: center;">
      <div id="loader" class="freezr-spinner" style="display: none;"></div>
    </div>

    <div id="connectionsList" class="freezr-card">
      <p style="color:#64748b;">Loading…</p>
    </div>

  </div>
</div>
